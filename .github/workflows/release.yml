name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Install semantic-release
        run: |
          npm install --no-save \
            semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/exec \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/release-notes-generator \
            conventional-changelog-conventionalcommits

      - name: Seed the pre-automation release baseline
        run: |
          if ! git tag --list 'v*' | grep -q .; then
            git tag v0.1.0 "$(git rev-list --max-parents=0 HEAD)"
          fi

      - name: Configure Developer ID signing
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_P12: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_P12 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          for required_name in APPLE_DEVELOPER_ID_CERTIFICATE_P12 APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD; do
            if [[ -z "${!required_name:-}" ]]; then
              echo "$required_name is required."
              exit 1
            fi
          done

          keychain_path="$RUNNER_TEMP/record-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          printf '%s' "$APPLE_DEVELOPER_ID_CERTIFICATE_P12" | base64 -D > "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain_path" > /dev/null

          codesign_identity="$(
            security find-identity -v -p codesigning "$keychain_path" |
              sed -n '/Developer ID Application/s/.*\([0-9A-F]\{40\}\).*/\1/p'
          )"
          if [[ "$(printf '%s\n' "$codesign_identity" | sed '/^$/d' | wc -l | tr -d ' ')" != "1" ]]; then
            echo "Expected exactly one Developer ID Application identity in the release keychain."
            exit 1
          fi

          rm -f "$certificate_path"
          {
            echo "CAPTURE_CODESIGN_IDENTITY=$codesign_identity"
            echo "CAPTURE_CODESIGN_KEYCHAIN=$keychain_path"
            echo "RECORD_SIGNING_KEYCHAIN=$keychain_path"
          } >> "$GITHUB_ENV"

      - name: Configure notarization
        env:
          APPLE_NOTARIZATION_KEY_P8: ${{ secrets.APPLE_NOTARIZATION_KEY_P8 }}
          APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          APPLE_NOTARIZATION_ISSUER_ID: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}
        run: |
          set -euo pipefail
          for required_name in APPLE_NOTARIZATION_KEY_P8 APPLE_NOTARIZATION_KEY_ID APPLE_NOTARIZATION_ISSUER_ID; do
            if [[ -z "${!required_name:-}" ]]; then
              echo "$required_name is required."
              exit 1
            fi
          done

          notary_key_path="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_NOTARIZATION_KEY_P8" | base64 -D > "$notary_key_path"
          chmod 600 "$notary_key_path"
          {
            echo "APPLE_NOTARIZATION_KEY_PATH=$notary_key_path"
            echo "APPLE_NOTARIZATION_KEY_ID=$APPLE_NOTARIZATION_KEY_ID"
            echo "APPLE_NOTARIZATION_ISSUER_ID=$APPLE_NOTARIZATION_ISSUER_ID"
          } >> "$GITHUB_ENV"

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up signing material
        if: always()
        run: |
          rm -f "${APPLE_NOTARIZATION_KEY_PATH:-}"
          if [[ -n "${RECORD_SIGNING_KEYCHAIN:-}" && -f "$RECORD_SIGNING_KEYCHAIN" ]]; then
            security delete-keychain "$RECORD_SIGNING_KEYCHAIN" || true
          fi
